#!/bin/bash
# Скрипт установки бинарников для GitHub Actions

set -e

echo "Установка системных зависимостей..."
sudo apt-get update && sudo apt-get install -y wget curl unzip jq

# 1. Установка Xray Core
echo "Скачивание Xray Core..."
XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip" -O xray.zip
sudo unzip -o xray.zip -d /usr/local/bin
sudo chmod +x /usr/local/bin/xray
rm xray.zip

# 2. Установка Librespeed-CLI
echo "Скачивание Librespeed-CLI..."
# Берем стабильную версию
wget -q "https://github.com/librespeed/speedtest-cli/releases/download/v1.0.10/librespeed-cli_1.0.10_linux_amd64.tar.gz" -O librespeed.tar.gz
sudo tar -xzf librespeed.tar.gz -C /usr/local/bin
sudo chmod +x /usr/local/bin/librespeed-cli
rm librespeed.tar.gz

echo "Проверка бинарников..."
/usr/local/bin/xray -version
/usr/local/bin/librespeed-cli --version

echo "Все бинарники установлены успешно с правами Root."
