name: Proxy Checker Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Binaries (Root access)
        run: |
          # Даем права самому скрипту установки и запускаем его
          chmod +x install.sh
          ./install.sh

      - name: Run Proxy Checker with Sudo
        run: |
          # Запускаем основной скрипт от имени суперпользователя
          sudo python3 main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Update proxy lists [skip ci]" || echo "No changes to commit"
          git push
