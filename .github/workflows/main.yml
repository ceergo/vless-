name: Proxy Checker Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Setup Binaries (Root Access)
        run: |
          sudo apt-get update && sudo apt-get install -y wget curl unzip jq
          
          echo "Installing Xray..."
          XRAY_TAG=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
          wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_TAG}/Xray-linux-64.zip" -O xray.zip
          sudo unzip -o xray.zip -d /usr/local/bin
          sudo chmod +x /usr/local/bin/xray
          rm xray.zip

          echo "Installing Librespeed..."
          wget -q "https://github.com/librespeed/speedtest-cli/releases/download/v1.0.10/librespeed-cli_1.0.10_linux_amd64.tar.gz" -O ls.tar.gz
          sudo tar -xzf ls.tar.gz -C /usr/local/bin
          sudo chmod +x /usr/local/bin/librespeed-cli
          rm ls.tar.gz

      - name: Run Proxy Checker
        run: |
          touch links.txt
          sudo python3 main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Sync with remote stable configs and update results [skip ci]" || echo "No changes to commit"
          git push
