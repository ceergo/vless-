name: Check proxy subscriptions

on:
  schedule:
    # Каждые 3 часа
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  check-proxies:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Xray (linux-amd64)
        run: |
          XRAY_ZIP_URL="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          curl -L "$XRAY_ZIP_URL" -o xray.zip
          unzip -q xray.zip
          # В архиве обычно лежит бинарник "xray"
          chmod +x xray
          rm -f xray.zip

      - name: Download librespeed-cli (linux-amd64)
        run: |
          LIBRESPEED_URL="https://github.com/librespeed/speedtest-cli/releases/latest/download/speedtest-cli_v1.0.12_linux_amd64"
          curl -L "$LIBRESPEED_URL" -o librespeed-cli
          chmod +x librespeed-cli

      - name: Run subscription checker
        run: python main.py

