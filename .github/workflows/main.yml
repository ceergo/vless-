name: Gemini Proxy Checker

on:
  # Позволяет запускать вручную из интерфейса GitHub
  workflow_dispatch:
  # Позволяет запускать через API (от твоего бота)
  repository_dispatch:
    types: [run_proxy_check]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем права на запись изменений в файлы txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm install axios http-proxy-agent

      - name: Prepare Binaries
        run: |
          # Создаем папку если её нет
          mkdir -p bin
          # Проверяем, существует ли бинарник. Если нет - выводим предупреждение.
          if [ ! -f bin/ladspeed ]; then
            echo "WARNING: bin/ladspeed not found! Creating a dummy for debug or you should upload it."
            # Здесь можно добавить curl для скачивания реального бинарника, если он лежит в релизах
            touch bin/ladspeed 
          fi
          chmod +x bin/ladspeed
          # Выводим текущий путь для отладки
          pwd
          ls -R bin/

      - name: Run Checker
        run: sudo node main.js
        env:
          SUB_URL: ${{ github.event.client_payload.sub_url || 'ВАША_ДЕФОЛТНАЯ_ССЫЛКА' }}

      - name: Commit and Push results
        run: |
          git config --global user.name "GeminiBot"
          git config --global user.email "bot@gemini.check"
          git add gemini.txt general.txt dead.txt || true
          git commit -m "Auto-update proxy lists [skip ci]" || echo "No changes to commit"
          git push
